name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          pip install flet==0.19.0
          # إذا كان لديك ملف requirements.txt يفضل استخدامه:
          # pip install -r requirements.txt
          pip install "flet[all]" 

      - name: Build APK
        run: |
          # نحدد ملف main.py بشكل صريح
          # تأكد من وجود ملف flet_config.toml في المجلد الرئيسي
          flet build apk main.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-pulse-apk
          # مسار المخرجات الافتراضي لـ flet build
          path: build/apk/*.apk
