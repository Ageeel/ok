name: Build Android APK
on:
  push:
    branches: [ main ] # سيتم البناء عند الرفع على فرع main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet

      - name: Build APK
        run: |
          # flet build apk --project "اسم تطبيقك"
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-pulse-apk
          path: build/apk/*.apk
