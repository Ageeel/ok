name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          # التأكد من تثبيت النسخة 0.19.0 تحديداً
          pip install flet==0.19.0
          flutter doctor

      - name: Build APK
        run: |
          # إضافة --assets assets هو المفتاح لحل مشكلة الشاشة البيضاء
          # تأكد أن اسم المجلد في ريبو GitHub هو assets (أحرف صغيرة)
          yes | flet build apk --project "PixelPulse" --org "com.ageeel.pixel" --product "PixelPulseApp" --assets assets
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pixel-pulse-apk
          path: build/apk/*.apk
